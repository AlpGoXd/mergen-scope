name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html mergen_scope.html mergen-scope-preview.png robots.txt sitemap.xml _site/
          cp mergen-scope-icon.svg _site/
          cp -r vendor _site/
          cp -r app-modules _site/

      - name: Validate runtime files
        run: |
          test -f _site/mergen_scope.html
          test -f _site/vendor/react/react.production.min.js
          test -f _site/app-modules/ui-helpers.js
          test -f _site/app-modules/trace-model.js
          test -f _site/app-modules/trace-helpers.js
          test -f _site/mergen-scope-icon.svg
          test -f _site/mergen-scope-preview.png

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
