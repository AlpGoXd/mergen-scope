<!--
  Mergen Scope
  Phase 1 changelog:
  - Fixed: IP3 now uses visible marker-role assignments instead of the old disconnected click-step flow.
  - Added: selected-marker behavior, Min / Next Min, import normalization, saved-result normalization, manual regression checklist, local vendored runtime imports.
  - Later: raw vs derived traces, trace math, multi-pane evolution, synchronized pane cursor/readout.

  Manual regression checklist:
  1. Normal single trace: import one regular trace, verify startup, chart render, hover, X/Y zoom, markers, Peak, Next Peak, Min, Next Min.
  2. Amplitude-only trace: import a file that relies on Start/Stop reconstruction and verify frequencies are reconstructed, sorted, and still chart correctly.
  3. Overlapping two-trace pair: import two overlapping traces, verify visibility toggles, marker trace targeting, and crosshair readout across both.
  4. Non-overlapping two-trace pair: import traces with separated spans and verify marker fallback, X zoom, and saved results still bind to the correct trace.
  5. Sparse vs dense pair: import one sparse and one dense trace, verify nearest-point marker placement plus Next Peak / Next Min sequence behavior.
  6. Noisy PSD trace: run Noise PSD, save a result, remove the source trace, and confirm the saved-result panel stays consistent.
  7. Two-tone IP3 trace: create/select markers, assign F1/F2/IM3L/IM3U, try auto-pick, move a labeled marker, save IP3, and verify values update from marker positions.

  Phase 1 signoff:
  - Startup works from repo-hosted files only.
  - Marker add/select/move/edit works on single-trace and two-trace views.
  - Next Peak / Next Min behave correctly with selected marker and Auto trace mode.
  - V/H reference lines place, edit, select, and move correctly.
  - Noise PSD saves and stays consistent after source-trace changes.
  - IP3 works from visible marker roles and saves normalized results.
  - Zoom, pan, crosshair, raw table, and saved-result panels still work after the above checks.
  Multi-trace spectrum analyzer file viewer with noise PSD, IP3, crosshair, Y-zoom, reference lines.
  Dependencies: React 18 (MIT), React DOM 18 (MIT), PropTypes (MIT), Recharts 2 (MIT) - vendored locally for GitHub Pages.
-->

<script type="module">
var React=window.React;
var createRoot=window.ReactDOM.createRoot;
var RC=window.Recharts;

var h=React.createElement;
var useState=React.useState,useCallback=React.useCallback,useRef=React.useRef,
    useMemo=React.useMemo,useEffect=React.useEffect,Fragment=React.Fragment;
var LineChart=RC.LineChart,Line=RC.Line,XAxis=RC.XAxis,YAxis=RC.YAxis,
    CartesianGrid=RC.CartesianGrid,Tooltip=RC.Tooltip,ResponsiveContainer=RC.ResponsiveContainer,
    ReferenceArea=RC.ReferenceArea,ReferenceLine=RC.ReferenceLine,ReferenceDot=RC.ReferenceDot,Legend=RC.Legend;

/* ═══ PARSER ═══ */
var _fc=0;
var _fid=0;
function makeTrace(prefix,fileName,traceLabel){
  return {name:prefix+traceLabel+"_"+_fc,mode:"",detector:"",data:[],file:fileName,dn:prefix+traceLabel};
}
function traceSig(tr){
  if(!tr||!tr.data||!tr.data.length)return "";
  var a=tr.data[0],b=tr.data[tr.data.length-1];
  return [tr.dn||"",tr.mode||"",tr.detector||"",tr.data.length,
    a.freq!==undefined?a.freq:"na",a.amp,b.freq!==undefined?b.freq:"na",b.amp].join("|");
}
function dedupeParsedTraces(traces){
  var seen={},out=[];
  traces.forEach(function(tr){
    if(!tr||!tr.data||!tr.data.length)return;
    var sig=traceSig(tr);
    if(seen[sig])return;
    seen[sig]=true;
    out.push(tr);
  });
  return out;
}
function fileSig(fileObj){
  if(!fileObj)return "";
  var meta=fileObj.meta||{};
  var metaSig=Object.keys(meta).sort().map(function(k){
    var v=meta[k];
    return k+":"+((typeof v==="object"&&v&&v.value!==undefined)?(v.value+" "+(v.unit||"")):String(v));
  }).join("||");
  var traceSigs=(fileObj.traces||[]).map(traceSig).join("###");
  return [fileObj.fileName||"",metaSig,traceSigs].join("@@");
}
function dedupeFiles(list){
  var seen={},out=[];
  list.forEach(function(f){
    if(!f)return;
    var cleanTraces=dedupeParsedTraces((f.traces||[]).slice());
    var cleanFile=Object.assign({},f,{traces:cleanTraces});
    var sig=fileSig(cleanFile);
    if(!sig||seen[sig])return;
    seen[sig]=true;
    out.push(cleanFile);
  });
  return out;
}
function mergeFileLists(base,added){
  return dedupeFiles((base||[]).concat(added||[]));
}
function nearestPoint(tr,freq,left,right){
  if(!tr||!tr.data||!tr.data.length||!isFinite(freq))return null;
  var data=tr.data;
  var lo=0,hi=data.length-1,mid;
  if(left!=null||right!=null){
    while(lo<data.length&&left!=null&&data[lo].freq<left)lo++;
    while(hi>=0&&right!=null&&data[hi].freq>right)hi--;
    if(lo>hi)return null;
  }
  while(lo<hi){
    mid=(lo+hi)>>1;
    if(data[mid].freq<freq)lo=mid+1; else hi=mid;
  }
  var idx=lo;
  var best=data[idx],bestDist=Math.abs(data[idx].freq-freq);
  if(idx>0){
    var p=data[idx-1],d=Math.abs(p.freq-freq);
    if(d<bestDist){best=p;bestDist=d;idx=idx-1;}
  }
  if(idx+1<data.length){
    var n=data[idx+1],d2=Math.abs(n.freq-freq);
    if(d2<bestDist){best=n;bestDist=d2;idx=idx+1;}
  }
  if(data.length>1){
    var prev=idx>0?data[idx-1]:null;
    var next=idx+1<data.length?data[idx+1]:null;
    var localStep=Math.min(
      prev?Math.abs(best.freq-prev.freq):Infinity,
      next?Math.abs(next.freq-best.freq):Infinity
    );
    if(!isFinite(localStep)||localStep<=0){
      var span=Math.abs(data[data.length-1].freq-data[0].freq);
      localStep=data.length>1?span/(data.length-1):Infinity;
    }
    var maxDist=isFinite(localStep)&&localStep>0?localStep*2.5:Infinity;
    if(bestDist>maxDist)return null;
  }
  return best;
}
function normalizeTraceData(data){
  if(!Array.isArray(data)||!data.length)return [];
  var rows=data.filter(function(d){
    return d&&isFinite(d.freq)&&isFinite(d.amp);
  }).map(function(d){
    return {freq:Number(d.freq),amp:Number(d.amp)};
  });
  rows.sort(function(a,b){return a.freq-b.freq;});
  var out=[];
  rows.forEach(function(row){
    var last=out[out.length-1];
    if(last&&last.freq===row.freq){
      last.amp=row.amp;
    } else {
      out.push(row);
    }
  });
  return out;
}
function parseRSDat(text,fileName){
  _fc++;
  var prefix=fileName.replace(/\.[^.]+$/,'')+" ";
  var lines=text.split(/\r?\n/),meta={},traces=[],cur=null,inData=false,hadTraceDecl=false;
  for(var i=0;i<lines.length;i++){
    var trimmed=lines[i].trim();
    if(!trimmed){if(inData)inData=false;continue;}
    var parts=trimmed.split(';').map(function(s){return s.trim();});
    if(inData&&cur){
      var nums=parts.filter(function(s){return s!=='';}).map(Number);
      if(nums.length>=2&&nums.every(function(n){return !isNaN(n);})){cur.data.push({freq:nums[0],amp:nums[1]});continue;}
      if(nums.length===1&&!isNaN(nums[0])){cur.data.push({amp:nums[0]});continue;}
      inData=false;
    }
    if(/^Trace$/i.test(parts[0])&&parts[1]&&/^\d+$/.test(parts[1])){
      hadTraceDecl=true;
      cur=makeTrace(prefix,fileName,"Tr"+parts[1]);
      traces.push(cur);
      continue;
    }
    if(/^Trace Mode$/i.test(parts[0])&&cur){cur.mode=parts[1]||'';continue;}
    if(/^Detector$/i.test(parts[0])&&cur){cur.detector=parts[1]||'';continue;}
    if(/^Values$/i.test(parts[0])){
      inData=true;
      if(!cur){
        cur=makeTrace(prefix,fileName,"Tr"+(traces.length+1));
        traces.push(cur);
      }
      continue;
    }
    if(parts.length>=2&&/^[a-zA-Z]/.test(parts[0])){
      var nv=parseFloat(parts[1]);
      meta[parts[0]]=!isNaN(nv)&&parts[1]!==''?{value:nv,unit:parts[2]||''}:parts[1];
    }
  }
  if(traces.length===0&&!hadTraceDecl){
    cur=makeTrace(prefix,fileName,'Tr1');
    for(var j=0;j<lines.length;j++){
      var p=lines[j].trim().split(';').filter(function(s){return s.trim()!=='';}).map(Number);
      if(p.length>=2&&p.every(function(n){return !isNaN(n);}))cur.data.push({freq:p[0],amp:p[1]});
      else if(p.length===1&&!isNaN(p[0])&&cur.data.length>0)cur.data.push({amp:p[0]});
    }
    if(cur.data.length>0)traces.push(cur);
  }
  traces=dedupeParsedTraces(traces.filter(function(t){return t.data.length>0;}));
  var sf=meta["Start"]?.value||0,ef=meta["Stop"]?.value||0;
  traces.forEach(function(tr){
    if(tr.data.length>0&&tr.data[0].freq===undefined){
      var n=tr.data.length;
      tr.data.forEach(function(d,idx){d.freq=sf+(idx/Math.max(n-1,1))*(ef-sf);});
    }
    tr.data=normalizeTraceData(tr.data);
  });
  traces=dedupeParsedTraces(traces.filter(function(t){return t.data&&t.data.length>0;}));
  return {meta:meta,traces:traces};
}

/* ═══ NOISE PSD ═══ */
var ENBW={gaussian:{k:1.128,label:"Gaussian"},flattop:{k:1.0,label:"Flat-top"},fivepole:{k:1.047,label:"5-pole Sync"}};
function clampYValue(v){
  if(!isFinite(v))return null;
  return Math.max(-300,Math.min(300,v));
}
function getVisibleTraceData(tr,zoom){
  if(!tr||!tr.data)return [];
  return zoom?tr.data.filter(function(p){return p.freq>=zoom.left&&p.freq<=zoom.right;}):tr.data;
}
function getSafeYRangeFromData(allTr,vis,zoom){
  var mn=Infinity,mx=-Infinity,found=false;
  allTr.forEach(function(tr){
    if(!vis[tr.name])return;
    var d=getVisibleTraceData(tr,zoom);
    d.forEach(function(p){
      if(!p||!isFinite(p.amp))return;
      var a=clampYValue(p.amp);
      if(a===null)return;
      found=true;
      if(a<mn)mn=a;
      if(a>mx)mx=a;
    });
  });
  if(!found||!isFinite(mn)||!isFinite(mx))return null;
  if(mx-mn<0.1){
    var center=(mn+mx)/2;
    mn=center-2.5;
    mx=center+2.5;
  }
  var pad=Math.max((mx-mn)*0.08,0.5);
  mn=clampYValue(mn-pad);
  mx=clampYValue(mx+pad);
  if(mn===null||mx===null||!isFinite(mn)||!isFinite(mx)||mx<=mn)return null;
  return {min:mn,max:mx};
}
function sanitizeYDomain(z){
  if(!z||!isFinite(z.min)||!isFinite(z.max))return null;
  var mn=clampYValue(z.min),mx=clampYValue(z.max);
  if(mn===null||mx===null||!isFinite(mn)||!isFinite(mx)||mx<=mn)return null;
  var span=mx-mn;
  if(span<0.001||span>2000)return null;
  return {min:mn,max:mx};
}
function makeYTicksFromDomain(domain){
  return makeNiceTicks(domain,9);
}
function makeNiceTicks(domain,count){
  if(!domain||!isFinite(domain.min)||!isFinite(domain.max)||domain.max<=domain.min)return undefined;
  count=Math.max(2,count||9);
  var span=domain.max-domain.min;
  var rough=span/(count-1);
  if(!isFinite(rough)||rough<=0)return undefined;
  var mag=Math.pow(10,Math.floor(Math.log10(Math.abs(rough))));
  var norm=rough/mag;
  var niceNorm=norm<=1?1:norm<=2?2:norm<=2.5?2.5:norm<=5?5:10;
  var step=niceNorm*mag;
  if(!isFinite(step)||step<=0)return undefined;
  var start=Math.floor(domain.min/step)*step;
  var end=Math.ceil(domain.max/step)*step;
  var ticks=[];
  var decimals=Math.max(0,Math.ceil(-Math.log10(step))+1);
  for(var v=start; v<=end+step*0.5; v+=step){
    var rounded=Number(v.toFixed(Math.min(6,decimals)));
    if(rounded>=domain.min-step*0.25&&rounded<=domain.max+step*0.25)ticks.push(rounded);
    if(ticks.length>count+4)break;
  }
  if(ticks.length<2){
    ticks=[Number(domain.min.toFixed(3)),Number(domain.max.toFixed(3))];
  }
  return ticks;
}
function computeYWheelZoom(base,deltaY,frac,autoRange){
  if(!base||!isFinite(base.min)||!isFinite(base.max))return autoRange||null;
  var span=base.max-base.min;
  if(!isFinite(span)||span<=0)return autoRange||null;
  var factor=deltaY<0?0.85:(1/0.85);
  var nextSpan=Math.max(0.001,Math.min(2000,span*factor));
  if(!isFinite(frac))frac=0.5;
  frac=Math.max(0,Math.min(1,frac));
  var center=base.min+(span*frac);
  if(!isFinite(center))center=(base.min+base.max)/2;
  var newMin=center-frac*nextSpan;
  var newMax=newMin+nextSpan;
  return sanitizeYDomain({min:newMin,max:newMax})||autoRange||null;
}

function noisePSD(data,rbw,ftype){
  var kf=ENBW[ftype]||ENBW.gaussian;
  var c=10*Math.log10(kf.k*rbw);
  return data.map(function(d){return{freq:d.freq,amp:d.amp-c};});
}

/* ═══ IP3 ═══ */
function calcIP3(f1,p1,f2,p2,pil,piu){
  var ol=p1+(p1-pil)/2,ou=p2+(p2-piu)/2;
  return{f1:f1,f2:f2,p1:p1,p2:p2,pim3l:pil,pim3u:piu,fim3l:2*f1-f2,fim3u:2*f2-f1,
    oip3_l:ol,oip3_u:ou,oip3_avg:(ol+ou)/2,deltaL:p1-pil,deltaU:p2-piu};
}

/* ═══ HELPERS ═══ */
var IP3_ROLE_KEYS=["f1","f2","im3l","im3u"];
var IP3_ROLE_LABELS={f1:"F1",f2:"F2",im3l:"IM3L",im3u:"IM3U"};
function isIP3Label(label){
  return ["F1","F2","IM3L","IM3U"].indexOf(label)!==-1;
}
function cloneMarkerWithoutIP3Label(marker){
  if(!marker)return marker;
  if(!isIP3Label(marker.label))return marker;
  var next=Object.assign({},marker);
  delete next.label;
  return next;
}
function getIP3PointsFromMarkers(markers){
  var pts={f1:null,f2:null,im3l:null,im3u:null};
  Object.keys(IP3_ROLE_LABELS).forEach(function(key){
    var label=IP3_ROLE_LABELS[key];
    var marker=(markers||[]).find(function(item){return item&&item.label===label;});
    if(marker)pts[key]={freq:marker.freq,amp:marker.amp,trace:marker.trace,label:marker.label};
  });
  return pts;
}
function calcIP3FromPoints(points){
  if(!points||!points.f1||!points.f2||!points.im3l||!points.im3u)return null;
  var low=points.f1.freq<=points.f2.freq?points.f1:points.f2;
  var high=points.f1.freq<=points.f2.freq?points.f2:points.f1;
  return calcIP3(low.freq,low.amp,high.freq,high.amp,points.im3l.amp,points.im3u.amp);
}
function makeSavedNoiseResult(npsdStats,noiseFilter,trace){
  if(!npsdStats||!trace)return null;
  var kf=ENBW[noiseFilter]||ENBW.gaussian;
  return {
    id:Date.now()+Math.random(),
    functionType:"noise-psd",
    traceLabel:trace.dn||trace.name,
    sourceTraceId:trace.name,
    sourceTraceName:trace.name,
    parameters:{
      filter:noiseFilter,
      filterLabel:kf.label,
      rbw:npsdStats.rbw,
      enbw:kf.k*npsdStats.rbw,
      correction:10*Math.log10(kf.k*npsdStats.rbw)
    },
    values:{
      peak:npsdStats.peak.amp,
      peakFreq:npsdStats.peak.freq,
      min:npsdStats.min.amp,
      minFreq:npsdStats.min.freq,
      avg:npsdStats.avg
    }
  };
}
function makeSavedIP3Result(ip3Res,ip3Pts,ip3Gain,traceLabel){
  if(!ip3Res||!ip3Pts)return null;
  return {
    id:Date.now()+Math.random(),
    functionType:"ip3",
    traceLabel:traceLabel||ip3Pts.f1?.trace||ip3Pts.f2?.trace||"-",
    sourceTraceId:ip3Pts.f1?.trace||ip3Pts.f2?.trace||ip3Pts.im3l?.trace||ip3Pts.im3u?.trace||null,
    sourceTraceName:ip3Pts.f1?.trace||ip3Pts.f2?.trace||ip3Pts.im3l?.trace||ip3Pts.im3u?.trace||null,
    parameters:{
      gain:ip3Gain!==''&&!isNaN(parseFloat(ip3Gain))?parseFloat(ip3Gain):null,
      roles:{
        f1Trace:ip3Pts.f1&&ip3Pts.f1.trace,
        f2Trace:ip3Pts.f2&&ip3Pts.f2.trace,
        im3lTrace:ip3Pts.im3l&&ip3Pts.im3l.trace,
        im3uTrace:ip3Pts.im3u&&ip3Pts.im3u.trace
      }
    },
    values:{
      oip3_l:ip3Res.oip3_l,
      oip3_u:ip3Res.oip3_u,
      oip3_avg:ip3Res.oip3_avg,
      deltaL:ip3Res.deltaL,
      deltaU:ip3Res.deltaU,
      f1:ip3Res.f1,
      f2:ip3Res.f2,
      fim3l:ip3Res.fim3l,
      fim3u:ip3Res.fim3u
    }
  };
}
function fmtF(hz){
  var a=Math.abs(hz);
  if(a>=1e9)return(hz/1e9).toFixed(6)+" GHz";
  if(a>=1e6)return(hz/1e6).toFixed(3)+" MHz";
  if(a>=1e3)return(hz/1e3).toFixed(3)+" kHz";
  return hz.toFixed(1)+" Hz";
}
function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}

function useMarkerActions(dep){
  var resolveMarkerTarget=useCallback(function(pt,targetAmp){
    var act=dep.allTr.filter(function(t){return dep.vis[t.name];});
    if(!act.length)return null;
    if(dep.markerTrace&&dep.markerTrace!=="__auto__"){
      var forced=act.find(function(t){return t.name===dep.markerTrace;});
      if(forced){
        if(pt[forced.name]!==undefined&&isFinite(pt[forced.name]))return {trace:forced.name,amp:pt[forced.name],freq:pt.freq};
        var fp=nearestPoint(forced,pt.freq,dep.zoom?dep.zoom.left:null,dep.zoom?dep.zoom.right:null);
        if(fp&&isFinite(fp.amp))return {trace:forced.name,amp:fp.amp,freq:fp.freq};
      }
    }
    if(isFinite(targetAmp)){
      var best=null,bestErr=Infinity;
      for(var i=0;i<act.length;i++){
        if(pt[act[i].name]!==undefined&&isFinite(pt[act[i].name])){
          var err=Math.abs(pt[act[i].name]-targetAmp);
          if(err<bestErr){bestErr=err;best={trace:act[i].name,amp:pt[act[i].name],freq:pt.freq};}
        }
      }
      if(best)return best;
    }
    for(var i=0;i<act.length;i++){
      if(pt[act[i].name]!==undefined&&isFinite(pt[act[i].name]))return {trace:act[i].name,amp:pt[act[i].name],freq:pt.freq};
    }
    if(isFinite(targetAmp)){
      var nearBest=null,nearErr=Infinity;
      for(var j=0;j<act.length;j++){
        var np1=nearestPoint(act[j],pt.freq,dep.zoom?dep.zoom.left:null,dep.zoom?dep.zoom.right:null);
        if(np1&&isFinite(np1.amp)){
          var nErr=Math.abs(np1.amp-targetAmp);
          if(nErr<nearErr){nearErr=nErr;nearBest={trace:act[j].name,amp:np1.amp,freq:np1.freq};}
        }
      }
      if(nearBest)return nearBest;
    }
    for(var j=0;j<act.length;j++){
      var np2=nearestPoint(act[j],pt.freq,dep.zoom?dep.zoom.left:null,dep.zoom?dep.zoom.right:null);
      if(np2&&isFinite(np2.amp))return {trace:act[j].name,amp:np2.amp,freq:np2.freq};
    }
    return null;
  },[dep.allTr,dep.vis,dep.markerTrace,dep.zoom]);

  function getVisibleData(tr){
    return dep.zoom?tr.data.filter(function(p){return p.freq>=dep.zoom.left&&p.freq<=dep.zoom.right;}):tr.data;
  }
  function buildExtrema(tr,kind){
    var data=getVisibleData(tr).filter(function(p){return isFinite(p.freq)&&isFinite(p.amp);});
    if(!data.length)return [];
    var out=[];
    for(var i=1;i<data.length-1;i++){
      var prev=data[i-1],cur=data[i],next=data[i+1];
      if(kind==="max"){
        if(cur.amp>=prev.amp&&cur.amp>=next.amp&&(cur.amp>prev.amp||cur.amp>next.amp))out.push(cur);
      } else {
        if(cur.amp<=prev.amp&&cur.amp<=next.amp&&(cur.amp<prev.amp||cur.amp<next.amp))out.push(cur);
      }
    }
    if(!out.length){
      out.push(data.reduce(function(best,p){
        if(!best)return p;
        return kind==="max"?(p.amp>best.amp?p:best):(p.amp<best.amp?p:best);
      },null));
    }
    return out;
  }
  function isLocalExtremum(data,idx,kind){
    if(!data||idx<=0||idx>=data.length-1)return false;
    var prev=data[idx-1],cur=data[idx],next=data[idx+1];
    if(!prev||!cur||!next)return false;
    if(kind==="max")return cur.amp>=prev.amp&&cur.amp>=next.amp&&(cur.amp>prev.amp||cur.amp>next.amp);
    return cur.amp<=prev.amp&&cur.amp<=next.amp&&(cur.amp<prev.amp||cur.amp<next.amp);
  }
  function nearestIndexByFreq(data,freq){
    if(!data||!data.length)return -1;
    var bestIdx=0,bestDf=Math.abs(data[0].freq-freq);
    for(var i=1;i<data.length;i++){
      var df=Math.abs(data[i].freq-freq);
      if(df<bestDf){bestDf=df;bestIdx=i;}
    }
    return bestIdx;
  }
  function getPreferredTraces(){
    var visible=dep.allTr.filter(function(t){return dep.vis[t.name];});
    if(dep.selectedMkrIdx!==null&&dep.selectedMkrIdx!==undefined&&dep.markers[dep.selectedMkrIdx]){
      var selectedTrace=dep.markers[dep.selectedMkrIdx].trace;
      var selectedOnly=visible.filter(function(t){return t.name===selectedTrace;});
      if(selectedOnly.length)return selectedOnly;
    }
    if(dep.markerTrace&&dep.markerTrace!=="__auto__"){
      var forced=visible.filter(function(t){return t.name===dep.markerTrace;});
      if(forced.length)return forced;
    }
    return visible;
  }
  function replaceOrAddMarker(point,type){
    if(!point)return;
    var sel=dep.selectedMkrIdx;
    if(sel!==null&&sel!==undefined&&dep.markers[sel]){
      dep.setMarkers(function(prev){
        var next=prev.slice();
        var current=next[sel]||{};
        next[sel]=Object.assign({},current,{freq:point.freq,amp:point.amp,trace:point.trace,type:type||current.type||"normal"});
        if(next[sel].type!=="delta")delete next[sel].refIdx;
        return next;
      });
      return;
    }
    dep.addMarker({freq:point.freq,amp:point.amp,trace:point.trace,type:type||"normal"},true);
  }
  function findBestAcrossTraces(kind){
    var best=null;
    getPreferredTraces().forEach(function(tr){
      buildExtrema(tr,kind).forEach(function(point){
        if(!best)best={trace:tr.name,freq:point.freq,amp:point.amp};
        else if(kind==="max"&&point.amp>best.amp)best={trace:tr.name,freq:point.freq,amp:point.amp};
        else if(kind==="min"&&point.amp<best.amp)best={trace:tr.name,freq:point.freq,amp:point.amp};
      });
    });
    return best;
  }
  function findNextOnSelected(kind){
    var sel=dep.selectedMkrIdx;
    if(sel===null||sel===undefined||!dep.markers[sel])return null;
    var marker=dep.markers[sel];
    var tr=dep.allTr.find(function(item){return item.name===marker.trace&&dep.vis[item.name];});
    if(!tr)return null;
    var data=getVisibleData(tr).filter(function(point){return isFinite(point.freq)&&isFinite(point.amp);});
    var startIdx=nearestIndexByFreq(data,marker.freq);
    var localStep=Infinity;
    if(data.length>=2&&startIdx!==-1){
      if(startIdx>0)localStep=Math.min(localStep,Math.abs(data[startIdx].freq-data[startIdx-1].freq));
      if(startIdx<data.length-1)localStep=Math.min(localStep,Math.abs(data[startIdx+1].freq-data[startIdx].freq));
    }
    if(!isFinite(localStep)||localStep<=0){
      localStep=Math.max((dep.nextPeakExclusion||0)/32,1e-9);
    }
    var samePointTol=Math.max(localStep*0.75,1e-9);
    var otherMarkerTol=Math.max(localStep*0.75,1e-9);
    var traceOrder={};
    dep.allTr.forEach(function(item,idx){traceOrder[item.name]=idx;});
    function occupiedByOther(point){
      return dep.markers.some(function(other,idx){
        return idx!==sel&&other&&other.trace===point.trace&&isFinite(other.freq)&&Math.abs(other.freq-point.freq)<=otherMarkerTol;
      });
    }
    var seqTraces=(dep.markerTrace&&dep.markerTrace!=="__auto__")?[tr]:dep.allTr.filter(function(item){return dep.vis[item.name];});
    var extrema=[];
    seqTraces.forEach(function(item){
      buildExtrema(item,kind).forEach(function(point){
        extrema.push({trace:item.name,freq:point.freq,amp:point.amp});
      });
    });
    extrema.sort(function(a,b){
      if(Math.abs(a.freq-b.freq)>samePointTol)return a.freq-b.freq;
      return (traceOrder[a.trace]||0)-(traceOrder[b.trace]||0);
    });
    var freeExtrema=extrema.filter(function(point){return !occupiedByOther(point);});
    var markerTraceOrder=traceOrder[marker.trace]||0;
    function pickFrom(list){
      if(!list.length)return null;
      if(dep.searchDirection==="left"){
        for(var j=list.length-1;j>=0;j--){
          if(list[j].freq<marker.freq-samePointTol)return {trace:list[j].trace,freq:list[j].freq,amp:list[j].amp};
          if(Math.abs(list[j].freq-marker.freq)<=samePointTol&&(traceOrder[list[j].trace]||0)<markerTraceOrder)return {trace:list[j].trace,freq:list[j].freq,amp:list[j].amp};
        }
        return {trace:list[list.length-1].trace,freq:list[list.length-1].freq,amp:list[list.length-1].amp};
      }
      for(var i=0;i<list.length;i++){
        if(list[i].freq>marker.freq+samePointTol)return {trace:list[i].trace,freq:list[i].freq,amp:list[i].amp};
        if(Math.abs(list[i].freq-marker.freq)<=samePointTol&&(traceOrder[list[i].trace]||0)>markerTraceOrder)return {trace:list[i].trace,freq:list[i].freq,amp:list[i].amp};
      }
      return {trace:list[0].trace,freq:list[0].freq,amp:list[0].amp};
    }
    var nextFree=pickFrom(freeExtrema);
    if(nextFree)return nextFree;
    if(!extrema.length)return null;
    return pickFrom(extrema);
  }
  var peakSrch=useCallback(function(){
    replaceOrAddMarker(findBestAcrossTraces("max"),"peak");
  },[dep.allTr,dep.vis,dep.zoom,dep.markers,dep.selectedMkrIdx,dep.markerTrace,dep.nextPeakExclusion,dep.searchDirection]);

  var nxtPeak=useCallback(function(){
    replaceOrAddMarker(findNextOnSelected("max")||findBestAcrossTraces("max"),"peak");
  },[dep.allTr,dep.vis,dep.zoom,dep.markers,dep.selectedMkrIdx,dep.markerTrace,dep.nextPeakExclusion,dep.searchDirection]);

  var minSrch=useCallback(function(){
    replaceOrAddMarker(findBestAcrossTraces("min"),"normal");
  },[dep.allTr,dep.vis,dep.zoom,dep.markers,dep.selectedMkrIdx,dep.markerTrace,dep.nextPeakExclusion]);

  var nxtMin=useCallback(function(){
    replaceOrAddMarker(findNextOnSelected("min")||findBestAcrossTraces("min"),"normal");
  },[dep.allTr,dep.vis,dep.zoom,dep.markers,dep.selectedMkrIdx,dep.markerTrace,dep.nextPeakExclusion,dep.searchDirection]);

  return {resolveMarkerTarget:resolveMarkerTarget,peakSrch:peakSrch,nxtPeak:nxtPeak,minSrch:minSrch,nxtMin:nxtMin};
}

function useIP3Workflow(dep){
  function getTraceViewData(tr){
    if(!tr||!tr.data)return [];
    return dep.zoom?tr.data.filter(function(p){return p.freq>=dep.zoom.left&&p.freq<=dep.zoom.right;}):tr.data;
  }
  function findHighestPeakExcluding(data,excludeFreqs,exHz){
    var best=null;
    (data||[]).forEach(function(p){
      if(!isFinite(p?.freq)||!isFinite(p?.amp))return;
      if((excludeFreqs||[]).some(function(f){return Math.abs(p.freq-f)<exHz;}))return;
      if(!best||p.amp>best.amp)best=p;
    });
    return best;
  }
  function findPeakNearFreq(data,targetHz,windowHz){
    var best=null,near=null,nearDf=Infinity;
    (data||[]).forEach(function(p){
      if(!isFinite(p?.freq)||!isFinite(p?.amp))return;
      var df=Math.abs(p.freq-targetHz);
      if(df<nearDf){nearDf=df;near=p;}
      if(df<=windowHz&&(!best||p.amp>best.amp))best=p;
    });
    return best||near;
  }
  function upsertRoleMarker(prev,point,role){
    var label=IP3_ROLE_LABELS[role];
    var existingIdx=prev.findIndex(function(marker){return marker&&marker.label===label;});
    if(existingIdx!==-1){
      var next=prev.slice();
      next[existingIdx]=Object.assign({},next[existingIdx],{freq:point.freq,amp:point.amp,trace:point.trace,type:"peak",label:label});
      return next;
    }
    return prev.concat([{freq:point.freq,amp:point.amp,trace:point.trace,type:"peak",label:label}]);
  }
  var tryAutoCompleteIP3=useCallback(function(seed,selectedIdx){
    if(!seed||!seed.trace)return false;
    var tr=dep.allTr.find(function(t){return t.name===seed.trace;});
    var data=getTraceViewData(tr);
    if(!data.length)return false;
    var ex=dep.nextPeakExclusion;
    var other=findHighestPeakExcluding(data,[seed.freq],ex);
    if(!other)return false;
    var low=seed.freq<=other.freq?seed:other;
    var high=seed.freq<=other.freq?other:seed;
    var sep=Math.abs(high.freq-low.freq);
    if(!(sep>0))return false;
    var searchHz=Math.max(ex*2,sep*0.35);
    var fim3l=2*low.freq-high.freq;
    var fim3u=2*high.freq-low.freq;
    var im3l=findPeakNearFreq(data,fim3l,searchHz);
    var im3u=findPeakNearFreq(data,fim3u,searchHz);
    if(!im3l||!im3u)return false;
    var pts={
      f1:{freq:low.freq,amp:low.amp,trace:seed.trace},
      f2:{freq:high.freq,amp:high.amp,trace:seed.trace},
      im3l:{freq:im3l.freq,amp:im3l.amp,trace:seed.trace},
      im3u:{freq:im3u.freq,amp:im3u.amp,trace:seed.trace}
    };
    dep.setMarkers(function(prev){
      var next=dep.stripIP3Markers(prev);
      if(selectedIdx!==null&&selectedIdx!==undefined&&next[selectedIdx]){
        next=next.slice();
        next[selectedIdx]=Object.assign({},next[selectedIdx],{freq:pts.f1.freq,amp:pts.f1.amp,trace:pts.f1.trace,type:"peak",label:"F1"});
      } else {
        next=upsertRoleMarker(next,pts.f1,"f1");
      }
      next=upsertRoleMarker(next,pts.f2,"f2");
      next=upsertRoleMarker(next,pts.im3l,"im3l");
      next=upsertRoleMarker(next,pts.im3u,"im3u");
      return next;
    });
    return true;
  },[dep.allTr,dep.zoom,dep.nextPeakExclusion,dep.setMarkers,dep.stripIP3Markers]);
  return {tryAutoCompleteIP3:tryAutoCompleteIP3};
}


function deriveAxisInfo(files,fUnit,hasData){
  var xName=hasData?"Frequency":"";
  var yName=hasData?"Amplitude":"";
  var yUnit="dBm";
  for(var i=0;i<(files||[]).length;i++){
    var meta=files[i]?.meta||{};
    var cand=[meta["Ref Level"],meta["Level"],meta["Amplitude"],meta["Unit"]];
    for(var j=0;j<cand.length;j++){
      var v=cand[j];
      if(typeof v==="object"&&v&&typeof v.unit==="string"&&v.unit.trim()){yUnit=v.unit.trim();break;}
      if(typeof v==="string"&&/^[a-zA-Z%/]+$/.test(v.trim())){yUnit=v.trim();break;}
    }
    if(yUnit!=="dBm")break;
  }
  return {
    xLabel:hasData?(xName+" ("+(fUnit||"Hz")+")"):"",
    yLabel:hasData?(yName+" ("+yUnit+")"):"",
    yUnit:yUnit
  };
}

    var plotTop=8,plotBottom=36;
    var plotH=rect?Math.max(1,rect.height-plotTop-plotBottom):0;
    if(!(plotH>0))return null;
    var localY=null;
    if(ev.activeCoordinate&&isFinite(ev.activeCoordinate.y)){
      localY=Math.max(0,Math.min(plotH,ev.activeCoordinate.y));
    } else if(isFinite(ev.chartY)){
      localY=Math.max(0,Math.min(plotH,ev.chartY-plotTop));

    var frac=1-(localY/plotH);

    var markerMaxX=cData.length?cData[cData.length-1].freq:Infinity;
    var mLines=markers.map(function(m,i){
      if(!m||!isFinite(m.freq)||!isFinite(m.amp)||m.freq<markerMinX||m.freq>markerMaxX)return null;
      var selected=i===selectedMkrIdx;
      var col=(m.trace&&traceColorMap[m.trace])||(m.label?C.ip3C:(mcMap[m.type]||C.accent));
      return h(ReferenceDot,{key:"m-"+i,x:m.freq/fDiv,y:m.amp,r:selected?5:4,fill:col,stroke:"#fff",strokeWidth:selected?2:1,ifOverflow:"hidden",
        label:{value:(selected?"[":"")+(m.label||"M"+(i+1))+(selected?"]":""),position:"top",offset:8,fill:col,fontSize:selected?11:10,fontWeight:selected?700:400},
        onMouseDown:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();},
        onClick:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();setSelectedRefLineId(null);setSelectedMkrIdx(i);}});
    });
    var uLines=refLines.map(function(rl){
      if(rl.type==="v")return h(ReferenceLine,{key:"rl-"+rl.id,x:rl.value/fDiv,stroke:C.refV,strokeWidth:selectedRefLineId===rl.id?2.5:1.5,strokeDasharray:"8 4",
        label:{value:rl.label,position:"insideTopRight",fill:C.refV,fontSize:10},ifOverflow:"extendDomain",
        onMouseDown:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();setSelectedMkrIdx(null);setSelectedRefLineId(rl.id);dragRefLineRef.current={id:rl.id,type:"v"};},
        onClick:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();setSelectedMkrIdx(null);setSelectedRefLineId(rl.id);}});
      return h(ReferenceLine,{key:"rl-"+rl.id,y:rl.value,stroke:C.refH,strokeWidth:selectedRefLineId===rl.id?2.5:1.5,strokeDasharray:"8 4",
        label:{value:rl.label,position:"insideTopRight",fill:C.refH,fontSize:10},ifOverflow:"extendDomain",
        onMouseDown:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();setSelectedMkrIdx(null);setSelectedRefLineId(rl.id);dragRefLineRef.current={id:rl.id,type:"h"};},
        onClick:function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();setSelectedMkrIdx(null);setSelectedRefLineId(rl.id);}});
    });
    var crossLine=hoverX!==null?h(ReferenceLine,{key:"cross",x:hoverX/fDiv,stroke:C.cross,strokeWidth:1,strokeDasharray:"2 2"}):null;
    var selArea=null;
    var dragOverlay=null;
    if(selA!=null&&selB!=null){
      var domHz=getXDomainHz();
      if(domHz&&isFinite(domHz.left)&&isFinite(domHz.right)&&domHz.right>domHz.left){
        var rect=chartRef.current?chartRef.current.getBoundingClientRect():null;
        var plotLeft=76, plotRight=16, plotTop=8, plotBottom=36;
        var plotW=rect?Math.max(0,rect.width-plotLeft-plotRight):0;
        var plotH=rect?Math.max(0,rect.height-plotTop-plotBottom):0;
        if(plotW>0&&plotH>0){
          var aHz=selA*fDiv, bHz=selB*fDiv;
          var x1=(Math.min(aHz,bHz)-domHz.left)/(domHz.right-domHz.left)*plotW;
          var x2=(Math.max(aHz,bHz)-domHz.left)/(domHz.right-domHz.left)*plotW;
          x1=Math.max(0,Math.min(plotW,x1));
          x2=Math.max(0,Math.min(plotW,x2));
          var left=plotLeft+x1;
          var width=Math.max(1,Math.abs(x2-x1));
          dragOverlay=h('div',{style:{position:'absolute',left:left,top:plotTop,width:width,height:plotH,pointerEvents:'none',background:'rgba(0,120,212,0.04)',border:'1px solid rgba(0,120,212,0.45)',borderRadius:2,zIndex:9,boxSizing:'border-box'}});
        }
      }
    }
    var autoYZ=getSafeYRangeFromData(allTr,vis,zoom);
    var safeYZ=sanitizeYDomain(yZoom);
    var yBase=safeYZ||autoYZ;
    var yDomain=yBase?[yBase.min,yBase.max]:["auto","auto"];
    chartDomainRef.current=yBase;
    var yTicks=yBase?makeYTicksFromDomain(yBase):undefined;
    var xTicks=makeNiceTicks({min:cData[0].fs,max:cData[cData.length-1].fs},11);
    var zeroLine=h(ReferenceLine,{key:"zero",y:0,stroke:"var(--muted)",strokeWidth:1,strokeDasharray:"6 4"});

    var crosshairBox=null;
    if(hoverData&&hoverData.length>0&&hoverX!==null){
      var rows=[h("div",{key:"cr-f",className:"cr-row",style:{borderBottom:"1px solid var(--border)",paddingBottom:2,marginBottom:2}},
        h("span",{style:{color:"var(--muted)"}},fmtF(hoverX,true)))];
      hoverData.forEach(function(v,i){
        rows.push(h("div",{key:"cr-"+i,className:"cr-row"},
          h("span",null,h("span",{className:"cr-dot",style:{background:v.color}}),v.name),
          h("span",{style:{fontWeight:600}},v.value.toFixed(3))));
      });
      crosshairBox=h("div",{className:"crosshair-readout"},rows);
    }

    return h("div",{ref:chartRef,onContextMenu:function(ev){ev.preventDefault();},onMouseDownCapture:handleChartMouseDownCapture,onMouseUpCapture:handleChartMouseUpCapture,
      style:{flex:1,padding:"8px 12px 0",minHeight:0,position:"relative"}},
      crosshairBox,
      dragOverlay,
      h(ResponsiveContainer,{width:"100%",height:"100%"},
        h(LineChart,{data:cData,onClick:chartClick,onMouseDown:mDown,onMouseMove:chartMMWithDrag,onMouseUp:mUp,onMouseLeave:chartML,
          margin:{top:8,right:16,bottom:36,left:16}},
          h(CartesianGrid,{strokeDasharray:"2 2",stroke:C.grid}),
          h(XAxis,{dataKey:"fs",type:"number",domain:["dataMin","dataMax"],ticks:xTicks,tickFormatter:function(v){return v.toFixed(tickDp);},stroke:C.muted,fontSize:11,
            label:{value:axisInfo.xLabel,position:"bottom",offset:18,fill:C.muted,fontSize:12}}),
          h(YAxis,{stroke:C.muted,fontSize:11,domain:yDomain,ticks:yTicks,allowDataOverflow:true,
            tickFormatter:function(v){return Number(v).toFixed(2);},
            label:{value:axisInfo.yLabel,angle:-90,position:"insideLeft",offset:0,fill:C.muted,fontSize:12}}),
          h(Tooltip,{content:function(){return null;}}),
          (allTr.length>1||showNoise)?h(Legend,{wrapperStyle:{fontSize:11}}):null,
          lines,zeroLine,mLines,uLines,crossLine,selArea)));
  }

  function renderDT(){
    if(!showDT||!hasData)return null;
    var tr=allTr.find(function(t){return t.name===dtTrace;});
    var data=tr?(zoom?tr.data.filter(function(d){return d.freq>=zoom.left&&d.freq<=zoom.right;}):tr.data):[];
    return h("div",{style:{width:240,background:"var(--card)",borderLeft:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0}},
      h("div",{style:{padding:"8px 10px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:6}},
        h("span",{style:{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1}},"Data"),
        h("select",{value:dtTrace||"",onChange:function(ev){setDtTrace(ev.target.value);},
          style:{marginLeft:"auto",background:"var(--bg)",color:"var(--text)",border:"1px solid var(--border)",borderRadius:4,fontSize:11,padding:"2px 6px"}},
          allTr.map(function(t){return h("option",{key:t.name,value:t.name},t.dn||t.name);}))),
      h("div",{style:{padding:"4px 10px",borderBottom:"1px solid var(--border)",display:"flex",fontSize:11,fontWeight:700,color:"var(--muted)"}},
        h("span",{style:{flex:1}},"#"),h("span",{style:{flex:3,textAlign:"right"}},"Freq"),h("span",{style:{flex:2,textAlign:"right"}},yU)),
      h("div",{style:{flex:1,overflowY:"auto"}},
        data.map(function(d,i){
          return h("div",{key:i,style:{display:"flex",padding:"2px 10px",fontSize:11,fontFamily:"monospace",borderBottom:"1px solid var(--bg)",background:i%2===0?"transparent":"var(--da)"}},
            h("span",{style:{flex:1,color:"var(--dim)"}},i+1),
            h("span",{style:{flex:3,textAlign:"right",color:"var(--text)"}},d.freq.toFixed(1)),
            h("span",{style:{flex:2,textAlign:"right",color:"var(--damp)"}},d.amp.toFixed(3)));
        })));
  }

  function renderTopBar(){
    return h(TopBar,{files:files,removeFile:removeFile,hasData:hasData,C:C,importRef:iRef,showSidebar:showSidebar,setShowSidebar:setShowSidebar,showMarkers:showMarkers,setShowMarkers:setShowMarkers,showDots:showDots,setShowDots:setShowDots,showDT:showDT,setShowDT:setShowDT,analysisButtons:analysisButtons,clearAllFiles:clearAllFiles});
  }

  function renderFooter(){
    return h(FooterBar,{hasData:hasData,paneCount:panes.length,analysisRegistry:analysisRegistry});
  }


  /* ═══ ROOT ═══ */
  var main;
  var rp=[];
  if(showNoise||showIP3)rp.push(renderAnalysis());
  if(showDT)rp.push(h(DataTablePane,{render:renderDT}));
  main=h("div",{style:{flex:1,display:"flex",overflow:"hidden"}},
    showSidebar?h(SidebarPane,{render:renderSidebar}):null,
    h("div",{style:{flex:1,display:"flex",flexDirection:"column",minWidth:0}},
      error?h("div",{style:{background:"var(--err-bg)",border:"1px solid var(--err-bd)",borderRadius:6,padding:"6px 12px",margin:"8px 12px 0",fontSize:13,color:"var(--err-tx)",flexShrink:0}},error):null,
      renderToolbar(),h(ChartPane,{render:renderChart}),renderFooter()),
    rp);

  return h("div",{style:{background:"var(--bg)",color:"var(--text)",height:"100vh",display:"flex",flexDirection:"column"},
    onDragOver:function(ev){ev.preventDefault();setIsDrag(true);},
    onDragLeave:function(ev){if(!ev.currentTarget.contains(ev.relatedTarget))setIsDrag(false);},
    onDrop:onDrop},
    h("input",{ref:fRef,type:"file",accept:".dat,.csv,.txt",multiple:true,style:{display:"none"},onChange:function(ev){if(ev.target.files.length)loadFiles(ev.target.files,false);ev.target.value="";}}),
    h("input",{ref:iRef,type:"file",accept:".dat,.csv,.txt",multiple:true,style:{display:"none"},onChange:function(ev){if(ev.target.files.length)loadFiles(ev.target.files,true);ev.target.value="";}}),
    hasData&&isDrag?renderOverlay():null,
    renderTopBar(),main);
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body></html>
