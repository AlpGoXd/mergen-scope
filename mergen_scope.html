<!--
  Mergen Scope
  Recent changes:
  - Phase 1: marker selection, minima search, marker-driven IP3, import normalization, saved-result cleanup, local vendored runtime imports.
  - Phase 2: raw/derived trace model, Trace Ops, smoothing methods, trace math, interpolation choices, unit-aware warnings.
  - Phase 3: multi-pane layout, pane-local lines, pane-targeted import, and shared or pane-local X navigation.
  - Phase 4: expanded analysis toolkit including peak/spur tables, range stats, bandwidth, crossings, ripple, OBW, and guarded channel power.

  Manual regression checklist:
  1. Normal single trace: import one regular trace, verify startup, chart render, hover, X/Y zoom, markers, Peak, Next Peak, Min, Next Min.
  2. Amplitude-only trace: import a file that relies on Start/Stop reconstruction and verify frequencies are reconstructed, sorted, and still chart correctly.
  3. Overlapping two-trace pair: import two overlapping traces, verify visibility toggles, marker trace targeting, and crosshair readout across both.
  4. Non-overlapping two-trace pair: import traces with separated spans and verify marker fallback, X zoom, and saved results still bind to the correct trace.
  5. Sparse vs dense pair: import one sparse and one dense trace, verify nearest-point marker placement plus Next Peak / Next Min sequence behavior.
  6. Noisy PSD trace: run Noise PSD, save a result, remove the source trace, and confirm the saved-result panel stays consistent.
  7. Two-tone IP3 trace: create/select markers, assign F1/F2/IM3L/IM3U, try auto-pick, move a labeled marker, save IP3, and verify values update from marker positions.
  8. Multi-pane pass: switch panes, drag traces between panes, test locked lines, and verify Zoom All on/off behavior.
  9. Phase 4 pass: open Peak / Spur Table, Range Statistics, and Threshold Crossings, then confirm results follow the active pane and visible range.

  Phase 1 signoff:
  - Startup works from repo-hosted files only.
  - Marker add/select/move/edit works on single-trace and two-trace views.
  - Next Peak / Next Min behave correctly with selected marker and Auto trace mode.
  - V/H reference lines place, edit, select, and move correctly.
  - Noise PSD saves and stays consistent after source-trace changes.
  - IP3 works from visible marker roles and saves normalized results.
  - Zoom, pan, crosshair, raw table, and saved-result panels still work after the above checks.
  Multi-trace spectrum analyzer file viewer with noise PSD, IP3, crosshair, Y-zoom, and reference lines.
  Dependencies: React 18, React DOM 18, PropTypes, and Recharts 2 are vendored locally for GitHub Pages.
-->
